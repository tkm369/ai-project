name: TikTok Session Keepalive

on:
  schedule:
    - cron: '0 1,5,9,13,17,21 * * *'  # 4時間ごと（JST 10,14,18,22,02,06時）
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check and keepalive TikTok session
        run: |
          git config --global --add safe.directory C:/actions-runner/_work/ai-project/ai-project
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe tiktok_auto\session_keepalive.py
        shell: cmd
