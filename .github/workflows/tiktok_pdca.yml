name: TikTok PDCA

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜 10:00 JST
  workflow_dispatch:      # 手動実行

jobs:
  pdca:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect analytics
        env:
          TIKTOK_SESSION_ID:     ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_EXTRA_COOKIES:  ${{ secrets.TIKTOK_EXTRA_COOKIES }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe analytics_collector.py
        shell: cmd

      - name: Run PDCA optimizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe strategy_optimizer.py
        shell: cmd

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/posts_log.json tiktok_auto/pdca_report.json tiktok_auto/config.py
          git diff --staged --quiet || git commit -m "chore: PDCA update [skip ci]"
          git pull --no-rebase
          git push
        shell: cmd
