name: TikTok Auto Post

on:
  schedule:
    # JST = UTC+9  →  09:00=00:00, 15:00=06:00, 21:00=12:00
    - cron: '0 0 * * *'   # 毎日 09:00 JST
    - cron: '0 6 * * *'   # 毎日 15:00 JST
    - cron: '0 12 * * *'  # 毎日 21:00 JST
  workflow_dispatch:       # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # queue.json を更新してコミットするため

    steps:
      # ---- リポジトリをチェックアウト ----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Python セットアップ -----------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ---- 依存ライブラリをインストール --------------------------
      - name: Install dependencies
        run: |
          pip install -r tiktok_auto/requirements.txt
          playwright install chromium --with-deps

      # ---- ffmpeg は ubuntu-latest に標準搭載 ------------------

      # ---- 新着取得 → 動画生成 → TikTok投稿 -------------------
      - name: Run post job
        env:
          TIKTOK_SESSION_ID:      ${{ secrets.TIKTOK_SESSION_ID }}
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_ACCESS_TOKEN:   ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:        ${{ secrets.THREADS_USER_ID }}
        run: |
          cd tiktok_auto
          python post_job.py

      # ---- queue.json / seen_ids.json をコミット ---------------
      - name: Commit state update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/queue.json tiktok_auto/seen_ids.json
          git diff --staged --quiet || git commit -m "chore: auto queue update [skip ci]"
          git push
