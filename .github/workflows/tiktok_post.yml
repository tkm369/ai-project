name: TikTok Auto Post

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 07:00 JST
    - cron: '0 3 * * *'   # 毎日 12:00 JST
    - cron: '0 6 * * *'   # 毎日 15:00 JST
    - cron: '0 9 * * *'   # 毎日 18:00 JST
    - cron: '0 12 * * *'  # 毎日 21:00 JST
    - cron: '0 14 * * *'  # 毎日 23:00 JST
  workflow_dispatch:       # 手動実行ボタン

jobs:
  post:
    runs-on: self-hosted
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Reset workspace
        run: |
          git config --global --add safe.directory C:/actions-runner/_work/ai-project/ai-project
          git rebase --abort 2>nul
          if exist .git\rebase-merge rmdir /s /q .git\rebase-merge 2>nul
          if exist .git\rebase-apply rmdir /s /q .git\rebase-apply 2>nul
          git reset --hard HEAD 2>nul
          git clean -fd 2>nul
          exit 0
        shell: cmd

      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch TikTok session from file
        run: |
          set /p SID=<C:\actions-runner\tiktok_session.txt
          if "%SID%"=="" (echo [WARNING] session file empty) else (echo TIKTOK_SESSION_ID=%SID%>> %GITHUB_ENV%)
        shell: cmd

      - name: Run post job
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd tiktok_auto
          C:\qwen3tts-jp\Qwen3-TTS-JP\.venv\Scripts\python.exe post_job.py
        shell: cmd

      - name: Commit state
        run: |
          git config --global --add safe.directory C:/actions-runner/_work/ai-project/ai-project
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tiktok_auto/posts_log.json tiktok_auto/strategy.json
          git diff --staged --quiet || git commit -m "chore: 投稿ログ更新 [skip ci]"
          git fetch origin
          if exist .git\rebase-merge rmdir /s /q .git\rebase-merge 2>nul
          git rebase origin/master
          git push
        shell: cmd
